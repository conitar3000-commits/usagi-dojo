          tar -xzf /tmp/site.tgz
          git add index.html style.css app.js openings-data.js manifest.webmanifest service-worker.js README.md assets
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Update 8-move training and evaluations [skip ci]"
            git push
          fi
