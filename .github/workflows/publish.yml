        run: |
          printf "%s" "$SITE_ARCHIVE" | base64 --decode > /tmp/usagi-dojo.tar.gz
          tar -xzf /tmp/usagi-dojo.tar.gz

      - name: Save site files to the repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md app.js assets index.html manifest.webmanifest service-worker.js style.css
          if ! git diff --cached --quiet; then
            git commit -m "Publish site files [skip ci]"
            git push
          fi

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
