name: Publish うさぎ道場

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Restore site files
        shell: bash
        run: |
          cat > /tmp/usagi-dojo-site.tar.gz.b64 <<'ARCHIVE'
          
          ARCHIVE
          mkdir -p public
          base64 -d /tmp/usagi-dojo-site.tar.gz.b64 > /tmp/usagi-dojo-site.tar.gz
          tar -xzf /tmp/usagi-dojo-site.tar.gz -C public

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
